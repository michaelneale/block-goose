<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>goose has moved — Redirecting…</title>
  <script>
    // Redirect from old block.github.io/goose/* to goose-docs.ai/*
    // Strip the GitHub Pages project prefix (first path segment) and preserve the rest
    var path = window.location.pathname.replace(/^\/[^/]+/, '');
    var dest = 'https://goose-docs.ai' + path + window.location.search + window.location.hash;
    window.location.replace(dest);
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=https://goose-docs.ai">
  </noscript>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; text-align: center; color: #333; }
    h1 { font-size: 2em; }
    a { color: #0969da; }
  </style>
</head>
<body>
  <h1>🦆 goose has moved!</h1>
  <p>The goose documentation has moved to <a href="https://goose-docs.ai">goose-docs.ai</a>.</p>
  <p>You should be redirected automatically. If not, <a id="dest" href="https://goose-docs.ai">click here</a>.</p>
  <script>document.getElementById('dest').href = 'https://goose-docs.ai' + window.location.pathname.replace(/^\/[^/]+/, '') + window.location.search + window.location.hash;</script>
</body>
</html>
